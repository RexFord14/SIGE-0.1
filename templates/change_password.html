{% extends "base.html" %}
{% block title %}Cambiar Contraseña{% endblock %}
{% block content %}
<div style="max-width:440px;">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px;">
    <a href="{{ url_for('dashboard.index') }}" style="color:#475569;text-decoration:none;font-size:14px;">← Dashboard</a>
    <h1 class="font-display" style="font-size:20px;font-weight:700;color:#E2E8F0;margin:0;">Cambiar Contraseña</h1>
  </div>
  <div class="card" style="padding:28px;">
    <form method="POST">
      <div style="margin-bottom:16px;">
        <label class="form-label">Contraseña Actual</label>
        <input type="password" name="old_password" class="form-input" required>
      </div>
      <div style="margin-bottom:16px;">
        <label class="form-label">Nueva Contraseña</label>
        <input type="password" name="new_password" class="form-input" required minlength="8">
      </div>
      <div style="margin-bottom:24px;">
        <label class="form-label">Confirmar Nueva Contraseña</label>
        <input type="password" name="confirm_password" class="form-input" required minlength="8">
      </div>
      <button type="submit" class="btn-primary" style="width:100%;">Actualizar Contraseña</button>
    </form>
  </div>
</div>
{% endblock %}
